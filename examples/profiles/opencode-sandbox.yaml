# Profiles config. Install at ~/.config/opencode-sandbox/config.yaml so that
# `opencode-sandbox -p go-dev run` and `opencode-sandbox -p node-dev run` work
# from any directory without a project-local opencode-sandbox.yaml.
#
# Paths resolve relative to this file, so Dockerfile-go and Dockerfile-node are
# expected to live alongside it.
#
# Usage from any project directory:
#   opencode-sandbox -p go-dev run -e ANTHROPIC_API_KEY=sk-ant-...
#
# Override the bound project directory per-invocation:
#   opencode-sandbox -p go-dev run -e ANTHROPIC_API_KEY=sk-ant-... -v $PWD:/workspace
#
# Expose to the LAN instead of loopback:
#   opencode-sandbox -p go-dev run --bind 0.0.0.0 -e ANTHROPIC_API_KEY=sk-ant-...

docker:
  # host: tcp://build-box:2375   # applies to all profiles; override with --docker-host
  # macos: true                  # set when the Docker host is macOS-based (Docker Desktop / Colima / OrbStack)
  #                              # enables early validation that bind mount sources exist on the macOS host

default_profile: go-dev

profiles:

  go-dev:
    docker:
      # host: tcp://go-build-box:2375   # overrides global docker.host for this profile only
    build:
      dockerfile: ./Dockerfile-go
      context: .
      args:
        OPENCODE_VERSION: latest
    run:
      env:
        GOFLAGS: "-mod=mod"
        OPENCODE_TELEMETRY: "0"
        # Pass secrets at runtime: opencode-sandbox run -e ANTHROPIC_API_KEY=sk-ant-...
      mounts:
        # $PWD binds the directory you invoke the tool from, so opencode
        # sees the same files as your editor.
        - source: $PWD
          target: /workspace
        - source: ~/.gitconfig
          target: /root/.gitconfig
          readonly: true
        - source: ~/.ssh
          target: /root/.ssh
          readonly: true
      workdir: /workspace
      port:
        bind: 127.0.0.1

  node-dev:
    build:
      dockerfile: ./Dockerfile-node
      context: .
      args:
        OPENCODE_VERSION: latest
    run:
      env:
        NODE_ENV: development
        OPENCODE_TELEMETRY: "0"
        # Pass secrets at runtime: opencode-sandbox run -e ANTHROPIC_API_KEY=sk-ant-...
      mounts:
        - source: $PWD
          target: /workspace
        - source: ~/.gitconfig
          target: /root/.gitconfig
          readonly: true
        - source: ~/.ssh
          target: /root/.ssh
          readonly: true
        # Reuse the host npm cache so installs inside the container stay fast.
        - source: ~/.npm
          target: /root/.npm
      workdir: /workspace
      port:
        bind: 127.0.0.1
