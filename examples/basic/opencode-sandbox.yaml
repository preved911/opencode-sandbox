docker:
  # host: tcp://1.2.3.4:2375   # remote daemon; falls back to $DOCKER_HOST or local socket
  # macos: true                 # set when the Docker host is macOS-based (Docker Desktop / Colima / OrbStack)
  #                             # enables early validation that bind mount sources exist on the macOS host

# default_profile: basic        # uncomment to skip -p/--profile flag

profiles:
  basic:
    docker:
      # attach_host: my-box.local   # host in the printed URL; auto-derived from `host` if omitted

    build:
      dockerfile: ./Dockerfile
      context: .
      # Inject the AI provider key as a build-time secret so it is never baked into
      # image layers.  The Dockerfile can consume it via RUN --mount=type=secret,id=api-key.
      # secrets:
      #   - id: api-key
      #     env: ANTHROPIC_API_KEY

    run:
      env:
        OPENCODE_TELEMETRY: "0"
        # Pass secrets at runtime with -e rather than storing them in config:
        #   opencode-sandbox run -e ANTHROPIC_API_KEY=sk-ant-...

      mounts:
        # Bind the project directory you want opencode to work in.
        # Override per-invocation with -v:
        #   opencode-sandbox run -v ~/otherproject:/workspace
        - source: ~/workspace
          target: /workspace

        # Share your Git identity so commits from inside the container look correct.
        - source: ~/.gitconfig
          target: /root/.gitconfig
          readonly: true

        # Share your SSH keys so git-over-SSH works inside the container.
        - source: ~/.ssh
          target: /root/.ssh
          readonly: true

      workdir: /workspace

      port:
        # Override at runtime to expose to the LAN:
        #   opencode-sandbox run --bind 0.0.0.0
        bind: 127.0.0.1
